<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>showreel — dansch</title>
  <meta name="description" content="Showreel — Daniel Schrempf, motion graphics + design, London UK.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    @font-face {
      font-family: "Degular Mono";
      src: url("fonts/DegularMonoVariable.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light dark;
      --bg: #e6e6d4;
      --fg: #000;
      --fs: clamp(0.8rem, 2.6vw, 1rem);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --fg: #e6e6d4;
      }
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    html {
      scrollbar-gutter: stable;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Degular Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 400;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .4s ease;
    }

    body.ready #stage {
      opacity: 1;
    }

    body.exiting #stage {
      opacity: 0;
    }

    #stage .frame {
      aspect-ratio: 45 / 32;   /* the reel's native ratio */
      width: min(90vw, calc(70vh * 45 / 32));
      background: #000;
      border-radius: 8px;
      overflow: hidden;   /* clip the oversized iframe (seam crop) */
    }

    #stage iframe {
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      margin: -2px;
      border: 0;
      display: block;
    }

    #topnav {
      position: fixed;
      top: 10vh;
      left: 0;
      right: 0;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: var(--fs);
      line-height: 1.35;
      font-weight: 400;
      color: var(--fg);
      pointer-events: none;
    }

    #topnav a {
      color: inherit;
      text-decoration: none;
      pointer-events: auto;
    }

    #topnav .s {
      color: #06F;
    }
  </style>
  <script src="print.js"></script>
  <script src="cursor.js"></script>
</head>

<body>
  <div id="stage">
    <div class="frame">
      <iframe
        src="https://player.vimeo.com/video/1051603658?badge=0&title=0&byline=0&portrait=0&dnt=1&autopause=0&loop=1"
        allow="autoplay; fullscreen; picture-in-picture; encrypted-media" allowfullscreen
        title="dansch showreel"></iframe>
    </div>
  </div>
  <pre id="topnav">================== <span class="s">SHOWREEL</span> ========= <a href="index.html">BACK</a></pre>
  <script>
    const topnav = document.getElementById("topnav");

    // print the header on, then fade the player in
    Print.in(topnav, () => document.body.classList.add("ready"));

    // BACK: un-print + fade out, then navigate
    const back = topnav.querySelector("a");
    if (back) back.addEventListener("click", (e) => {
      e.preventDefault();
      document.body.classList.add("exiting");
      Print.out(topnav, () => { location.href = back.getAttribute("href"); });
    });
  </script>
</body>

</html>
