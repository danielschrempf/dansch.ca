<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hi — dansch</title>
  <meta name="description" content="Say hi — get in touch with Daniel Schrempf, motion graphics + design, London UK.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    @font-face {
      font-family: "Degular Mono";
      src: url("fonts/DegularMonoVariable.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light dark;
      --bg: #e6e6d4;
      --fg: #000;
      --fs: clamp(0.8rem, 2.6vw, 1rem);   /* match index/cv so the header lands on its line */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --fg: #e6e6d4;
      }
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    html { scrollbar-gutter: stable; }   /* same centring width as the other pages */

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Degular Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 400;
      overflow: hidden;
    }

    /* The form sits centred, clearing the nav, capped at a comfortable form width. */
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .4s ease;
    }

    body.ready #stage { opacity: 1; }
    body.exiting #stage { opacity: 0; }

    #stage .frame {
      /* No fixed ratio (a Typeform is adaptive UI). Centred; capped width, and a
         height of 70vh so the top clears the nav (rests at --rest = 10vh) with ~15vh
         above/below. Narrow screens fall back to 90vw. */
      width: min(90vw, 42rem);
      height: min(70vh, 40rem);
      background: var(--bg);
      border-radius: 8px;
      overflow: hidden;   /* round the corners */
    }

    #stage iframe {
      /* Oversize a few px and let .frame clip it — same trick as showreel: hides any
         hairline seam at the iframe's edge. The form centres its content, so cropping
         the outer couple px costs nothing. */
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      margin: -2px;
      border: 0;
      display: block;
    }

    #topnav {
      position: fixed;
      top: 10vh;
      left: 0;
      right: 0;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: var(--fs);
      line-height: 1.35;
      font-weight: 400;
      color: var(--fg);
      pointer-events: none;
      /* First paint on the line HI holds on the index wordmark rule (top rule =
         persist-top: 50vh − 5 lines), measured from its resting top (10vh).
         .settled slides it home; removing it (on BACK) slides it back to the index
         line so it hands off to the wordmark. */
      transform: translateY(calc(50vh - 5 * 1.35 * var(--fs) - 10vh));
      transition: transform .7s cubic-bezier(.4, 0, .2, 1);
    }

    body.settled #topnav { transform: translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      /* No slide — the header fades in place instead. */
      #topnav { transform: none; transition: opacity .5s ease; opacity: 0; }
      body.settled #topnav { opacity: 1; }
    }

    #topnav a {
      color: inherit;
      text-decoration: none;
      pointer-events: auto;
    }

    #topnav .h {
      color: #906;
    }
  </style>
  <script src="cursor.js"></script>
</head>

<body>
  <div id="stage">
    <div class="frame">
      <iframe
        src="https://form.typeform.com/to/vBH9fbQB"
        allow="camera; microphone; autoplay; encrypted-media;"
        title="say hi"></iframe>
    </div>
  </div>
  <pre id="topnav">=============================== <span class="h">HI</span> == <a href="index.html">BACK</a></pre>
  <script>
    const topnav = document.getElementById("topnav");
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

    // Slide the header from its persisted (landing-page) line up to the top, then
    // fade the form in behind it. Double rAF so the persisted position paints before
    // .settled triggers the transition; the timeout (≈ slide duration) gates the fade
    // without depending on transitionend (which won't fire under reduce).
    requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.add("settled")));
    setTimeout(() => document.body.classList.add("ready"), reduce ? 0 : 800);

    // BACK reverses the slide: drop the header back to the index line and fade the
    // form out, then navigate — handing the line back to the wordmark.
    const back = topnav.querySelector("a");
    if (back) back.addEventListener("click", (e) => {
      e.preventDefault();
      document.body.classList.remove("settled");
      document.body.classList.add("exiting");
      setTimeout(() => { location.href = back.getAttribute("href"); }, reduce ? 500 : 700);
    });
  </script>
</body>

</html>
