<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>demos — dansch</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    @font-face {
      font-family: "Degular Mono";
      src: url("fonts/DegularMonoVariable.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light dark;
      --bg: #e6e6d4;
      --fg: #000;
      --fs: clamp(0.8rem, 2.6vw, 1rem);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --fg: #e6e6d4;
      }
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    html { scrollbar-gutter: stable; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Degular Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 400;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8vmin;
      box-sizing: border-box;
    }

    #stage svg {
      max-width: 25%;
      max-height: 25%;
    }

    /* bottom nav: links opt into pointer events, the rest stays click-through */
    #bottomnav {
      position: fixed;
      bottom: 10vh;
      left: 0;
      right: 0;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: var(--fs);
      line-height: 1.35;
      font-weight: 400;
      color: var(--fg);
      pointer-events: none;
      opacity: 0;
      transition: opacity .4s ease;
    }

    #bottomnav a {
      color: inherit;
      text-decoration: none;
      pointer-events: auto;
    }

    body.ready #bottomnav { opacity: 1; }

    #topnav {
      position: fixed;
      top: 10vh;
      left: 0;
      right: 0;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: var(--fs);
      line-height: 1.35;
      font-weight: 400;
      color: var(--fg);
      pointer-events: none;
    }

    #stage { transition: opacity .3s ease; }

    body.exiting #stage { opacity: 0; }

    #topnav a {
      color: inherit;
      text-decoration: none;
      pointer-events: auto;
    }

    #topnav .d {
      color: #F33;
    }
  </style>
  <script src="print.js"></script>
  <script src="cursor.js"></script>
</head>

<body>
  <div id="stage" aria-hidden="true"></div>
  <pre id="topnav">== <span class="d">DEMOS</span> ============================ <a href="index.html">BACK</a></pre>
  <pre id="bottomnav"><a href="#" class="prev">PREVIOUS</a> ============================ <a href="#" class="next">NEXT</a></pre>
  <script src="vendor/lottie.min.js"></script>
  <script>
    const FOLDER = "demos/";
    const stage = document.getElementById("stage");
    const bottomnav = document.getElementById("bottomnav");
    const topnav = document.getElementById("topnav");
    const darkMQ = matchMedia("(prefers-color-scheme: dark)");
    let files = [], i = 0, anim = null, seq = 0;
    const cache = new Map();

    async function discover() {
      const found = [];
      for (let n = 1; n < 1000; n++) {
        const name = String(n).padStart(3, "0") + ".json";
        try {
          const res = await fetch(FOLDER + name, { method: "HEAD" });
          if (!res.ok) break;
          found.push(name);
        } catch (_) { break; }
      }
      return found;
    }

    async function load(name) {
      if (!cache.has(name))
        cache.set(name, await (await fetch(FOLDER + name)).json());
      return cache.get(name);
    }

    function inkRGB() {
      const hex = getComputedStyle(document.documentElement)
        .getPropertyValue("--fg").trim().replace("#", "");
      const h = hex.length === 3 ? hex.replace(/./g, "$&$&") : hex;
      return [0, 2, 4].map((p) => parseInt(h.slice(p, p + 2), 16) / 255);
    }

    function tint(doc, rgb) {
      const copy = JSON.parse(JSON.stringify(doc));
      (function walk(o) {
        if (Array.isArray(o)) return o.forEach(walk);
        if (o && typeof o === "object") {
          if (o.c && Array.isArray(o.c.k) && typeof o.c.k[0] === "number")
            o.c.k = [rgb[0], rgb[1], rgb[2], o.c.k[3] ?? 1];
          for (const k in o) walk(o[k]);
        }
      })(copy);
      return copy;
    }

    async function show(idx) {
      const mine = ++seq;   // a later click/theme-change supersedes us
      const doc = tint(await load(files[idx]), inkRGB());
      if (mine !== seq) return;
      if (anim) anim.destroy();
      anim = lottie.loadAnimation({
        container: stage,
        renderer: "svg",
        loop: true,
        autoplay: true,
        animationData: doc,
        rendererSettings: { preserveAspectRatio: "xMidYMid meet" },
      });
    }

    // step to prev/next sketch, wrapping at either end
    function go(step) {
      return (e) => {
        e.preventDefault();
        i = (i + step + files.length) % files.length;
        show(i);
      };
    }

    // print the header on; gates the sketches (with discovery)
    const printed = new Promise((r) => Print.in(topnav, r));

    // BACK: un-print both navs + fade out, then navigate
    const back = topnav.querySelector("a");
    if (back) back.addEventListener("click", (e) => {
      e.preventDefault();
      document.body.classList.add("exiting");
      Print.out(bottomnav);
      Print.out(topnav, () => { location.href = back.getAttribute("href"); });
    });

    Promise.all([discover(), printed]).then(([list]) => {
      files = list;
      if (!files.length) return;                  // no sketches — leave the nav hidden
      i = files.length - 1;
      show(i);
      document.body.classList.add("ready");
      Print.in(bottomnav);
      bottomnav.querySelector(".prev").addEventListener("click", go(+1));   // newer
      bottomnav.querySelector(".next").addEventListener("click", go(-1));   // older
      darkMQ.addEventListener("change", () => show(i));
    });
  </script>
</body>

</html>
