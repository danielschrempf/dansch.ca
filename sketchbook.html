<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>sketchbook — dansch</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  /* sketchbook.html is self-contained, like index.html. The background is locked
     to cream in BOTH light and dark — the sketches are black line drawings that
     want a constant paper backdrop, so there is deliberately no dark-mode swap. */
  @font-face {
    font-family: "Degular Mono";
    src: url("fonts/DegularMonoVariable.woff2") format("woff2");
    font-weight: 100 900; font-style: normal; font-display: swap;
  }
  :root {
    --bg: #e6e6d4;   /* cream paper — always */
    --fg: #000000;   /* ink */
    --muted: color-mix(in srgb, var(--fg) 45%, var(--bg));
  }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Degular Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-weight: 300;
    /* the whole viewport is one click target: click advances to the next sketch */
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }
  /* the animation fills the viewport with breathing room, keeping aspect ratio */
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 8vmin; box-sizing: border-box;
  }
  #stage svg { max-width: 100%; max-height: 100%; }
  /* counter: bottom-middle, monospace receipt style — e.g. "8-------", "-7------" */
  #counter {
    position: fixed; left: 0; right: 0; bottom: 1.5rem;
    text-align: center;
    color: var(--muted);
    font-size: .8rem;
    letter-spacing: .5em;
    white-space: pre;
    pointer-events: none;        /* clicks fall through to the body */
  }
</style>
</head>
<body>
  <div id="stage" aria-hidden="true"></div>
  <div id="counter"></div>
  <script src="vendor/lottie.min.js"></script>
  <script>
    const FOLDER = "sketchbook/";
    const stage = document.getElementById("stage");
    const counterEl = document.getElementById("counter");
    let files = [], i = 0, anim = null;

    // Static hosting can't list a folder, so probe 001.json, 002.json, … upward
    // until one is missing. The single 404 that ends the probe is expected.
    async function discover() {
      const found = [];
      for (let n = 1; n < 1000; n++) {
        const name = String(n).padStart(3, "0") + ".json";
        try {
          const res = await fetch(FOLDER + name, { method: "HEAD" });
          if (!res.ok) break;
          found.push(name);
        } catch (_) { break; }
      }
      return found;   // ascending; the last entry is the most recent sketch
    }

    // 8/8 -> "8-------", 7/8 -> "-7------", 1/8 -> "-------1". The newest sketch
    // sits at the left edge; each click walks the marker one step right.
    // (Designed for up to 9 sketches; double digits widen their own slot.)
    function counter(idx, total) {
      const num = idx + 1;              // files[idx] is sketch number idx+1
      const slot = total - num;         // newest (highest number) -> slot 0 (left)
      let s = "";
      for (let p = 0; p < total; p++) s += p === slot ? String(num) : "-";
      return s;
    }

    function show(idx) {
      if (anim) anim.destroy();
      anim = lottie.loadAnimation({
        container: stage,
        renderer: "svg",
        loop: true,
        autoplay: true,
        path: FOLDER + files[idx],
        rendererSettings: { preserveAspectRatio: "xMidYMid meet" },
      });
      counterEl.textContent = counter(idx, files.length);
    }

    discover().then((list) => {
      files = list;
      if (!files.length) { counterEl.textContent = "—"; return; }
      i = files.length - 1;             // start on the most recent
      show(i);
      document.body.addEventListener("click", () => {
        i = (i - 1 + files.length) % files.length;   // next most recent, wrapping
        show(i);
      });
    });
  </script>
</body>
</html>
